name: screen_time_tracker_with_aquarium
description: A screen time management app with gamification

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  timezone: ^0.11.0
  firebase_storage: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/clownfish.png
    - assets/images/blueFish.png
    - assets/images/shrimp.png
    - assets/images/goldFish.png

