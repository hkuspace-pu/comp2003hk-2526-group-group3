name: screen_time_tracker_with_aquarium
description: A screen time management app with gamification

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/clownfish.png
    - assets/images/blueFish.png
    - assets/images/shrimp.png
    - assets/images/goldFish.png

